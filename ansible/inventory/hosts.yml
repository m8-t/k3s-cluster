all:
  vars:
    ansible_user: debian
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519
    ansible_python_interpreter: /usr/bin/python3

  children:
    # Bootstrap node — initializes etcd cluster with --cluster-init
    k3s_init_master:
      hosts:
        k3s-master-1:
          ansible_host: 192.168.100.11

    # All three masters (includes k3s-master-1)
    k3s_masters:
      hosts:
        k3s-master-1:
          ansible_host: 192.168.100.11
        k3s-master-2:
          ansible_host: 192.168.100.12
        k3s-master-3:
          ansible_host: 192.168.100.13

    k3s_workers:
      hosts:
        k3s-worker-1:
          ansible_host: 192.168.100.21
        k3s-worker-2:
          ansible_host: 192.168.100.22
        k3s-worker-3:
          ansible_host: 192.168.100.23
