---
# cloud-init handles: system prereqs, k3s install, kube-vip static pod
# This play waits for the init master to be Ready, then fetches the kubeconfig.

- name: Fetch kubeconfig from init master
  hosts: k3s_init_master
  gather_facts: false
  tasks:
    - name: Wait for SSH connectivity
      wait_for_connection:
        delay: 10
        timeout: 600

    - name: Wait for k3s API server port
      wait_for:
        host: "{{ ansible_host }}"
        port: 6443
        timeout: 600
      delegate_to: localhost

    - name: Wait for init master node to be Ready
      command: >
        k3s kubectl get node {{ inventory_hostname }}
        -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      register: node_ready
      until: node_ready.stdout == "True"
      retries: 30
      delay: 10
      changed_when: false
      become: true

    - name: Fetch kubeconfig
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ local_kubeconfig_path }}"
        flat: true
      when: fetch_kubeconfig

    - name: Rewrite server address to kube-vip VIP
      delegate_to: localhost
      replace:
        path: "{{ local_kubeconfig_path }}"
        regexp: 'https://127\.0\.0\.1:6443'
        replace: "https://{{ kube_vip_ip }}:6443"
      when: fetch_kubeconfig
