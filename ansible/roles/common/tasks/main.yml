---
- name: Wait for SSH to become available
  wait_for_connection:
    delay: 60
    timeout: 600

- name: Wait for cloud-init to complete
  command: cloud-init status --wait
  changed_when: false
  failed_when: false
  timeout: 300

- name: Reboot to apply any kernel or package updates
  reboot:
    reboot_timeout: 300

- name: Disable swap immediately
  command: swapoff -a
  changed_when: false

- name: Remove swap entries from fstab
  replace:
    path: /etc/fstab
    regexp: '^([^#].*\s+swap\s+.*)$'
    replace: '# \1'

- name: Load required kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
    persistent: present
  loop:
    - br_netfilter
    - overlay

- name: Apply required sysctl settings
  copy:
    dest: /etc/sysctl.d/99-k3s.conf
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1
      net.ipv6.conf.all.forwarding        = 1
  notify: Reload sysctl

- name: Create /etc/rancher/k3s directory
  file:
    path: /etc/rancher/k3s
    state: directory
    mode: "0755"
    owner: root
    group: root
