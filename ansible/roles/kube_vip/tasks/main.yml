---
- name: Detect network interface for VIP
  shell: >
    ip route get {{ kube_vip_ip }} |
    awk 'NR==1{for(i=1;i<=NF;i++) if($i=="dev") print $(i+1)}'
  register: vip_iface
  changed_when: false

- name: Ensure static pod manifest directory exists
  file:
    path: /var/lib/rancher/k3s/agent/pod-manifests
    state: directory
    mode: "0755"

- name: Deploy kube-vip static pod manifest
  template:
    src: kube-vip.yaml.j2
    dest: /var/lib/rancher/k3s/agent/pod-manifests/kube-vip.yaml
    mode: "0644"
  vars:
    kube_vip_interface: "{{ vip_iface.stdout }}"
