---
- name: Deploy cert-manager HelmChart
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'cert-manager-helmchart.yaml.j2') | from_yaml }}"
  delegate_to: localhost
  become: false

- name: Wait for cert-manager deployment
  kubernetes.core.k8s_info:
    kind: Deployment
    name: cert-manager
    namespace: cert-manager
  register: cm_deploy
  until: >
    cm_deploy.resources is defined and
    cm_deploy.resources | length > 0 and
    (cm_deploy.resources[0].status.availableReplicas | default(0)) ==
    cm_deploy.resources[0].spec.replicas
  retries: 30
  delay: 10
  delegate_to: localhost
  become: false

- name: Wait for cert-manager webhook
  kubernetes.core.k8s_info:
    kind: Deployment
    name: cert-manager-webhook
    namespace: cert-manager
  register: cm_webhook
  until: >
    cm_webhook.resources is defined and
    cm_webhook.resources | length > 0 and
    (cm_webhook.resources[0].status.availableReplicas | default(0)) ==
    cm_webhook.resources[0].spec.replicas
  retries: 20
  delay: 10
  delegate_to: localhost
  become: false

- name: Wait for cert-manager webhook to register
  kubernetes.core.k8s_info:
    api_version: admissionregistration.k8s.io/v1
    kind: ValidatingWebhookConfiguration
    name: cert-manager-webhook
  register: cm_webhook_config
  until: cm_webhook_config.resources is defined and cm_webhook_config.resources | length > 0
  retries: 20
  delay: 5
  delegate_to: localhost
  become: false

- name: Apply self-signed ClusterIssuer
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'selfsigned-issuer.yaml.j2') | from_yaml }}"
  delegate_to: localhost
  become: false

- name: Apply CA Certificate
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'ca-certificate.yaml.j2') | from_yaml }}"
  delegate_to: localhost
  become: false

- name: Wait for CA certificate to be issued
  kubernetes.core.k8s_info:
    api_version: cert-manager.io/v1
    kind: Certificate
    name: k3s-ca
    namespace: cert-manager
  register: ca_cert
  until: >
    ca_cert.resources is defined and
    ca_cert.resources | length > 0 and
    ca_cert.resources[0].status.conditions | default([])
    | selectattr('type', 'equalto', 'Ready')
    | selectattr('status', 'equalto', 'True')
    | list | length > 0
  retries: 12
  delay: 10
  delegate_to: localhost
  become: false

- name: Apply CA ClusterIssuer
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'ca-issuer.yaml.j2') | from_yaml }}"
  delegate_to: localhost
  become: false
