---
- name: Deploy MetalLB HelmChart
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'metallb-helmchart.yaml.j2') | from_yaml }}"
  delegate_to: localhost
  become: false

- name: Wait for MetalLB controller
  kubernetes.core.k8s_info:
    kind: Deployment
    name: metallb-controller
    namespace: metallb-system
  register: metallb_deploy
  until: >
    metallb_deploy.resources is defined and
    metallb_deploy.resources | length > 0 and
    (metallb_deploy.resources[0].status.availableReplicas | default(0)) ==
    metallb_deploy.resources[0].spec.replicas
  retries: 30
  delay: 10
  delegate_to: localhost
  become: false

- name: Wait for MetalLB webhook to register
  kubernetes.core.k8s_info:
    api_version: admissionregistration.k8s.io/v1
    kind: ValidatingWebhookConfiguration
    name: metallb-webhook-configuration
  register: metallb_webhook_config
  until: metallb_webhook_config.resources is defined and metallb_webhook_config.resources | length > 0
  retries: 20
  delay: 5
  delegate_to: localhost
  become: false

- name: Apply MetalLB IP pool and L2 advertisement
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'metallb-config.yaml.j2') | from_yaml_all | list }}"
  delegate_to: localhost
  become: false
