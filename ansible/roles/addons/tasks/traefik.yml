---
- name: Apply Traefik HelmChartConfig for MetalLB IP
  shell: kubectl apply -f -
  args:
    stdin: "{{ lookup('template', 'traefik-config.yaml.j2') }}"
  changed_when: true

- name: Wait for Traefik to get LoadBalancer IP
  command: >
    kubectl get svc traefik -n kube-system
    -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
  register: traefik_lb_ip
  until: traefik_lb_ip.stdout == traefik_ip
  retries: 30
  delay: 10
  changed_when: false
