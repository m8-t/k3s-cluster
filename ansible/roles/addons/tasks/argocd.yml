---
- name: Ensure argocd namespace exists
  command: kubectl create namespace argocd --dry-run=client -o yaml
  register: ns_yaml
  changed_when: false

- name: Apply argocd namespace
  shell: kubectl apply -f -
  args:
    stdin: "{{ ns_yaml.stdout }}"
  changed_when: true

- name: Apply ArgoCD TLS certificate
  shell: kubectl apply -f -
  args:
    stdin: "{{ lookup('template', 'argocd-certificate.yaml.j2') }}"
  changed_when: true

- name: Wait for ArgoCD TLS certificate to be ready
  command: >
    kubectl wait certificate/{{ argocd_tls_secret }} -n argocd
    --for=condition=Ready --timeout=120s
  retries: 5
  delay: 10
  changed_when: false

- name: Deploy ArgoCD HelmChart
  shell: kubectl apply -f -
  args:
    stdin: "{{ lookup('template', 'argocd-helmchart.yaml.j2') }}"
  changed_when: true

- name: Wait for ArgoCD server
  command: kubectl rollout status deployment/argocd-server -n argocd --timeout=300s
  retries: 10
  delay: 15
  changed_when: false

- name: Apply ArgoCD Ingress
  shell: kubectl apply -f -
  args:
    stdin: "{{ lookup('template', 'argocd-ingress.yaml.j2') }}"
  changed_when: true
