---
- name: Fetch system-upgrade-controller manifest
  ansible.builtin.uri:
    url: "https://github.com/rancher/system-upgrade-controller/releases/download/{{ suc_version }}/system-upgrade-controller.yaml"
    return_content: true
  register: suc_manifest
  delegate_to: localhost

- name: Deploy system-upgrade-controller
  kubernetes.core.k8s:
    state: present
    definition: "{{ item }}"
  loop: "{{ suc_manifest.content | from_yaml_all | list }}"
  when: item is not none
  delegate_to: localhost
  become: false

- name: Wait for system-upgrade-controller deployment
  kubernetes.core.k8s_info:
    kind: Deployment
    name: system-upgrade-controller
    namespace: system-upgrade
  register: suc_deploy
  until: >
    suc_deploy.resources is defined and
    suc_deploy.resources | length > 0 and
    (suc_deploy.resources[0].status.availableReplicas | default(0)) ==
    suc_deploy.resources[0].spec.replicas
  retries: 30
  delay: 10
  failed_when: false
  delegate_to: localhost
  become: false

- name: Apply server upgrade Plan
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'upgrade-plan-server.yaml.j2') | from_yaml }}"
  delegate_to: localhost
  become: false

- name: Apply agent upgrade Plan
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'upgrade-plan-agent.yaml.j2') | from_yaml }}"
  delegate_to: localhost
  become: false
