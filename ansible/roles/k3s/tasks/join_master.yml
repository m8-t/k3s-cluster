---
- name: Wait for init master node to be Ready before joining
  command: >
    k3s kubectl get node {{ init_master_hostname }}
    -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  register: init_ready
  until: init_ready.stdout == "True"
  retries: 30
  delay: 10
  changed_when: false
  delegate_to: "{{ groups['k3s_init_master'][0] }}"

- name: Deploy k3s config for joining master
  template:
    src: k3s-server-join.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    mode: "0600"

- name: Install k3s (joining master)
  shell: curl -sfL https://get.k3s.io | sh -
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    K3S_TOKEN: "{{ k3s_token }}"
  args:
    creates: /usr/local/bin/k3s

- name: Wait for k3s service to become active
  command: systemctl is-active k3s
  register: k3s_active
  until: k3s_active.stdout == "active"
  retries: 30
  delay: 10
  changed_when: false

- name: Wait for node to join the cluster
  command: >
    k3s kubectl get node {{ inventory_hostname }}
    -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  register: node_ready
  until: node_ready.stdout == "True"
  retries: 30
  delay: 10
  changed_when: false
