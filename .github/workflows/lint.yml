---
name: Lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ansible: ${{ steps.filter.outputs.ansible }}
      tofu: ${{ steps.filter.outputs.tofu }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ansible:
              - 'ansible/**'
            tofu:
              - 'tofu/**'
            markdown:
              - '**/*.md'

  markdown-lint:
    needs: changes
    if: needs.changes.outputs.markdown == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"

  ansible-lint:
    needs: changes
    if: needs.changes.outputs.ansible == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install ansible-lint yamllint

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: Run yamllint
        run: yamllint ansible/

      - name: Run ansible-lint
        run: ansible-lint ansible/

  tofu-lint:
    needs: changes
    if: needs.changes.outputs.tofu == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install libvirt (required by provider binary)
        run: sudo apt-get install -y libvirt-dev

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Init (download providers, skip backend)
        run: tofu init -backend=false
        working-directory: tofu

      - name: Check formatting
        run: tofu fmt -check -recursive
        working-directory: tofu

      - name: Validate
        run: tofu validate
        working-directory: tofu

      - name: Set up tflint
        uses: terraform-linters/setup-tflint@v4

      - name: Run tflint
        run: tflint --chdir=tofu
